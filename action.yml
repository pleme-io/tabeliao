name: 'tabeliao-publish'
description: |
  Publish a compliant artifact to cartorio + push through lacre.
  Runs the named provas compliance pack against the manifest pre-publish
  and FAILS THE BUILD if any test fails. Bakes the deterministic
  pack_hash into the cartorio admission so verifiers can re-derive
  the proof from public inputs (no trust in pleme-io required).

  See cartorio/docs/COMPLIANCE-PROOF.md for the underlying model.

inputs:
  manifest:
    description: 'Path to the OCI manifest body (raw bytes, hashed as-is).'
    required: true
  config:
    description: 'Path to the YAML attestations config (kind, name, version, attestation pillars).'
    required: true
  cartorio-url:
    description: 'Cartorio base URL.'
    required: true
  lacre-url:
    description: 'Lacre base URL.'
    required: true
  image-path:
    description: 'OCI image path (e.g. myorg/openclaw-publisher-pki).'
    required: true
  reference:
    description: 'Reference to push under (tag or digest).'
    required: true
  pack:
    description: |
      Compliance pack name (e.g. fedramp-high-openclaw-image@2). REQUIRED
      — without it tabeliao admits without proof, which the action refuses.
    required: true
  signing-key:
    description: |
      64-hex-char private signing key. **Discouraged for production** —
      the key ends up in argv. Default algorithm is Ed25519
      (cryptographic, cosign-compatible).
    required: false
  signing-key-file:
    description: |
      Path to a file containing the 64-hex private signing key.
      Better than inline `signing-key`; pair with a sops-or-akeyless
      step that materializes the key to a tmpfs path. Mutually
      exclusive with `signing-key` and `signing-key-stdin`.
    required: false
  signing-key-stdin:
    description: |
      **PREFERRED FOR PRODUCTION.** When set to `true`, the key is read
      from the action step's stdin. Combine with a previous step that
      pipes the materialized key:

        - run: |
            cofre apply --manifest cofre.yaml
            sops --decrypt --extract '["openclaw_publisher_key"]' \
                 secrets.sops.json > /tmp/key
        - uses: pleme-io/tabeliao/.github/actions/publish@v0.7.1
          with:
            signing-key-stdin: 'true'
            ...
          stdin-from: /tmp/key

      The key never touches argv, never lives in env, and is wrapped
      in `Zeroizing<String>` once read.

      Mutually exclusive with `signing-key` and `signing-key-file`.
    required: false
    default: 'false'
  algorithm:
    description: |
      Signing algorithm: `ed25519` (default, cryptographic) or `blake3`
      (HMAC, shape-checked only). Blake3 is for tests/demos; production
      MUST be ed25519.
    required: false
    default: 'ed25519'
  content-type:
    description: 'Manifest content-type.'
    required: false
    default: 'application/vnd.oci.image.manifest.v1+json'
  tabeliao-version:
    description: 'tabeliao version to install (without leading v).'
    required: false
    default: '0.7.0'

outputs:
  artifact-id:
    description: 'Cartorio-assigned artifact id (art-...).'
    value: ${{ steps.publish.outputs.artifact-id }}
  digest:
    description: 'sha256 digest of the manifest.'
    value: ${{ steps.publish.outputs.digest }}
  composed-root:
    description: 'state-leaf composed_root of the admitted artifact.'
    value: ${{ steps.publish.outputs.composed-root }}

runs:
  using: 'composite'
  steps:
    - name: install tabeliao
      shell: bash
      run: |
        set -euo pipefail
        # Determine platform.
        case "$(uname -s)/$(uname -m)" in
          Linux/x86_64)   TARGET="x86_64-unknown-linux-gnu" ;;
          Linux/aarch64)  TARGET="aarch64-unknown-linux-gnu" ;;
          Darwin/x86_64)  TARGET="x86_64-apple-darwin" ;;
          Darwin/arm64)   TARGET="aarch64-apple-darwin" ;;
          *) echo "unsupported platform: $(uname -s)/$(uname -m)"; exit 1 ;;
        esac
        VERSION="${{ inputs.tabeliao-version }}"
        URL="https://github.com/pleme-io/tabeliao/releases/download/v${VERSION}/tabeliao-${TARGET}.tar.gz"
        curl -sSfL "$URL" -o /tmp/tabeliao.tar.gz || {
          echo "tabeliao v${VERSION} not yet released for ${TARGET};"
          echo "falling back to cargo install (slower, requires Rust)"
          cargo install --git https://github.com/pleme-io/tabeliao --tag "v${VERSION}" tabeliao
          exit 0
        }
        mkdir -p /tmp/tabeliao
        tar -xzf /tmp/tabeliao.tar.gz -C /tmp/tabeliao
        sudo install /tmp/tabeliao/tabeliao /usr/local/bin/tabeliao
        tabeliao --version

    - name: enforce pack + publish
      id: publish
      shell: bash
      env:
        TABELIAO_SIGNING_KEY: ${{ inputs.signing-key }}
        TABELIAO_SIGNING_KEY_FILE: ${{ inputs.signing-key-file }}
        TABELIAO_SIGNING_ALGORITHM: ${{ inputs.algorithm }}
        SIGNING_KEY_STDIN: ${{ inputs.signing-key-stdin }}
      run: |
        set -euo pipefail
        # Validate exactly one signing-key source.
        srcs=0
        [[ "${SIGNING_KEY_STDIN}" == "true" ]] && srcs=$((srcs+1))
        [[ -n "${TABELIAO_SIGNING_KEY:-}" ]]    && srcs=$((srcs+1))
        [[ -n "${TABELIAO_SIGNING_KEY_FILE:-}" ]] && srcs=$((srcs+1))
        if [[ $srcs -ne 1 ]]; then
          echo "ERROR: set exactly one of inputs.signing-key, inputs.signing-key-file, inputs.signing-key-stdin (got $srcs)"
          exit 1
        fi
        # tabeliao reads TABELIAO_SIGNING_KEY{,_FILE} + _ALGORITHM
        # directly from env. For stdin we add the explicit flag.
        EXTRA_FLAGS=()
        if [[ "${SIGNING_KEY_STDIN}" == "true" ]]; then
          EXTRA_FLAGS+=("--signing-key-stdin")
        fi
        OUTPUT=$(tabeliao publish \
          --manifest      '${{ inputs.manifest }}' \
          --config        '${{ inputs.config }}' \
          --cartorio      '${{ inputs.cartorio-url }}' \
          --lacre         '${{ inputs.lacre-url }}' \
          --image         '${{ inputs.image-path }}' \
          --reference     '${{ inputs.reference }}' \
          --content-type  '${{ inputs.content-type }}' \
          --pack          '${{ inputs.pack }}' \
          "${EXTRA_FLAGS[@]}")
        echo "$OUTPUT"
        # tabeliao publish emits JSON to stdout; logs go to stderr.
        echo "artifact-id=$(echo "$OUTPUT" | jq -r .artifact_id)" >> "$GITHUB_OUTPUT"
        echo "digest=$(echo "$OUTPUT" | jq -r .digest)" >> "$GITHUB_OUTPUT"
        echo "composed-root=$(echo "$OUTPUT" | jq -r .composed_root)" >> "$GITHUB_OUTPUT"
